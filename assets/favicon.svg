<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Gold lion silhouette on dark background -->
  <rect width="32" height="32" rx="6" fill="#0B0B0B"/>
  <!-- Stylized LS monogram -->
  <text x="50%" y="54%"
        font-family="Georgia, serif"
        font-size="18"
        font-weight="700"
        fill="#D4AF37"
        text-anchor="middle"
        dominant-baseline="middle"
        letter-spacing="-1">LS</text>
  <!-- Gold underline accent -->
  <rect x="6" y="25" width="20" height="2" rx="1" fill="#D4AF37"/>
</svg>