<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justilin Foimi — LionStride Management</title>
    <meta name="description" content="Justilin Foimi — Elite Endurance Athlete & Marathon Runner represented by LionStride Management.">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           ATHLETE PROFILE PAGE — Design System
           Layout & styles unchanged — only content updated.
           ============================================================ */

        /* --- Tokens --- */
        :root {
            --clr-bg:          #0a0a0c;
            --clr-bg-2:        #0e0e12;
            --clr-surface:     #131318;
            --clr-card:        #18181f;
            --clr-card-2:      #1c1c24;
            --clr-border:      rgba(255, 255, 255, 0.06);
            --clr-border-gold: rgba(201, 168, 76, 0.25);
            --clr-gold:        #c9a84c;
            --clr-gold-light:  #dfc276;
            --clr-gold-dim:    rgba(201, 168, 76, 0.09);
            --clr-text:        #f0ece4;
            --clr-text-2:      #a8a49c;
            --clr-text-3:      #6b6760;
            --font-display:    'Cormorant Garamond', Georgia, serif;
            --font-body:       'Inter', 'Helvetica Neue', sans-serif;
            --radius-sm:       4px;
            --radius-md:       8px;
            --radius-lg:       14px;
            --ease-out:        cubic-bezier(0.16, 1, 0.3, 1);
            --max-w:           1200px;
            --gutter:          clamp(20px, 5vw, 80px);
        }

        /* --- Reset --- */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
        body { font-family: var(--font-body); background: var(--clr-bg); color: var(--clr-text); line-height: 1.6; }
        img { max-width: 100%; display: block; }
        a { color: inherit; text-decoration: none; }
        ul { list-style: none; }
        ::selection { background: var(--clr-gold); color: var(--clr-bg); }

        /* --- Grain texture --- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .profile-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(201, 168, 76, 0.1);
        }
        .profile-header-inner {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 var(--gutter);
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }
        .profile-wordmark {
             display: flex;
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 500;
        }
          .logo-icon-img {
    width: 40px;       
    height: 40px;
    margin-right: 10px;
    object-fit: contain;
  filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
}
        .profile-wordmark span { color: var(--clr-gold); }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--clr-text-2);
            border: 0.5px solid var(--clr-border);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            transition: all 0.25s ease;
        }
        .back-btn:hover { border-color: var(--clr-gold); color: var(--clr-gold); }

        /* ============================================================
           LOADING STATE
           ============================================================ */
        .loading-state {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--clr-text-3);
            font-size: 0.9rem;
            letter-spacing: 0.08em;
        }
        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 1.5px solid var(--clr-border);
            border-top-color: var(--clr-gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ============================================================
           PROFILE WRAPPER
           ============================================================ */
        .profile-page {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 52px var(--gutter) 80px;
            position: relative;
            z-index: 1;
        }

        /* ============================================================
           1. HERO CARD — Image + Basic Info
           ============================================================ */
        .profile-hero {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 0;
            background: var(--clr-card);
            border: 0.5px solid var(--clr-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 24px;
        }

        /* Athlete Photo */
        .profile-photo {
            position: relative;
            aspect-ratio: 3 / 4;
            overflow: hidden;
            background: var(--clr-surface);
        }
        .profile-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            filter: saturate(0.85);
            transition: filter 0.4s ease;
        }
        .profile-photo:hover img { filter: saturate(1); }
        .profile-photo-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, transparent 60%, var(--clr-card) 100%);
        }

        /* Athlete Info Panel */
        .profile-info {
            padding: 40px 44px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 0;
        }

        .profile-eyebrow {
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--clr-gold);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .profile-eyebrow::before {
            content: '';
            width: 24px;
            height: 0.5px;
            background: var(--clr-gold);
        }

        .profile-name {
            font-family: var(--font-display);
            font-size: clamp(2.4rem, 4vw, 3.6rem);
            font-weight: 400;
            line-height: 1;
            letter-spacing: -0.02em;
            color: var(--clr-text);
            margin-bottom: 28px;
        }

        /* Info Fields */
        .info-fields {
            display: flex;
            flex-direction: column;
            gap: 0;
            margin-bottom: 32px;
        }
        .info-field {
            display: grid;
            grid-template-columns: 140px 1fr;
            align-items: baseline;
            padding: 10px 0;
            border-bottom: 0.5px solid var(--clr-border);
            gap: 16px;
        }
        .info-field:first-child { border-top: 0.5px solid var(--clr-border); }
        .info-label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--clr-text-3);
        }
        .info-value {
            font-size: 0.92rem;
            font-weight: 400;
            color: var(--clr-text);
        }

        /* Tags */
        .profile-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .profile-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--clr-gold);
            background: var(--clr-gold-dim);
            border: 0.5px solid var(--clr-border-gold);
            padding: 5px 12px;
            border-radius: var(--radius-sm);
        }

        /* ============================================================
           SHARED SECTION CARD STYLES
           ============================================================ */
        .profile-card {
            background: var(--clr-card);
            border: 0.5px solid var(--clr-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 24px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px 28px;
            border-bottom: 0.5px solid var(--clr-border);
            background: var(--clr-card-2);
        }
        .card-header-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--clr-gold);
        }
        .card-header-title {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--clr-text-2);
        }
        .card-body { padding: 28px; }

        /* ============================================================
           2. PERFORMANCE STATS (Personal Bests)
           ============================================================ */
        .bests-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
        }
        .best-item {
            padding: 20px 28px;
            border-right: 0.5px solid var(--clr-border);
        }
        .best-item:last-child { border-right: none; }
        .best-event {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--clr-text-3);
            margin-bottom: 8px;
        }
        .best-value {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--clr-gold);
            letter-spacing: -0.02em;
            line-height: 1;
        }

        /* ============================================================
           3. ATHLETE OVERVIEW
           ============================================================ */
        .overview-text {
            font-size: 0.95rem;
            font-weight: 300;
            color: var(--clr-text-2);
            line-height: 1.85;
        }

        /* ============================================================
           4. RESULTS TABLE
           ============================================================ */
        .race-table-wrap { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        thead tr { background: var(--clr-surface); }
        th {
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--clr-text-3);
            padding: 12px 16px;
            text-align: left;
            white-space: nowrap;
            border-bottom: 0.5px solid var(--clr-border);
        }
        td {
            padding: 14px 16px;
            color: var(--clr-text-2);
            font-size: 0.85rem;
            border-bottom: 0.5px solid var(--clr-border);
            vertical-align: middle;
            white-space: nowrap;
        }
        tr:last-child td { border-bottom: none; }
        tbody tr { transition: background 0.15s ease; }
        tbody tr:hover { background: var(--clr-card-2); }
        .td-race { font-weight: 500; color: var(--clr-text); }
        .td-goal {
            display: inline-flex;
            padding: 3px 10px;
            background: var(--clr-gold-dim);
            border: 0.5px solid var(--clr-border-gold);
            border-radius: var(--radius-sm);
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--clr-gold);
            letter-spacing: 0.05em;
        }

        /* ============================================================
           5. NATIONAL ACHIEVEMENTS — list inside card-body
           ============================================================ */
        .achievements-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .achievement-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 0;
            border-bottom: 0.5px solid var(--clr-border);
        }
        .achievement-item:last-child { border-bottom: none; }
        .achievement-icon {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--clr-gold-dim);
            border: 0.5px solid var(--clr-border-gold);
            border-radius: 50%;
            color: var(--clr-gold);
        }
        .achievement-text {
            font-size: 0.9rem;
            color: var(--clr-text);
            font-weight: 400;
        }
        .achievement-sub {
            font-size: 0.78rem;
            color: var(--clr-text-3);
            margin-top: 2px;
        }

        /* ============================================================
           6. CAREER POSITIONING — plain card-body text block
           ============================================================ */
        .career-text {
            font-size: 0.95rem;
            font-weight: 300;
            color: var(--clr-text-2);
            line-height: 1.85;
        }

        /* ============================================================
           7. REPRESENTATION — value grid (same style as before)
           ============================================================ */
        .value-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
        }
        .value-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 32px 20px;
            border-right: 0.5px solid var(--clr-border);
            text-align: center;
            transition: background 0.2s ease;
        }
        .value-item:last-child { border-right: none; }
        .value-item:hover { background: var(--clr-card-2); }
        .value-icon {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--clr-gold-dim);
            border: 0.5px solid var(--clr-border-gold);
            border-radius: 50%;
            color: var(--clr-gold);
            transition: all 0.25s ease;
        }
        .value-item:hover .value-icon {
            background: var(--clr-gold);
            color: var(--clr-bg);
        }
        .value-label {
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--clr-text-2);
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        .profile-footer {
            background: var(--clr-bg-2);
            border-top: 0.5px solid rgba(201, 168, 76, 0.1);
            padding: 28px var(--gutter);
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .profile-footer p { font-size: 0.72rem; color: var(--clr-text-3); letter-spacing: 0.1em; }
        .profile-footer a { color: var(--clr-gold); transition: opacity 0.2s; }
        .profile-footer a:hover { opacity: 0.7; }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 900px) {
            .profile-hero { grid-template-columns: 1fr; }
            .profile-photo { aspect-ratio: 16 / 9; }
            .profile-photo-overlay {
                background: linear-gradient(to bottom, transparent 60%, var(--clr-card) 100%);
            }
            .bests-grid { grid-template-columns: repeat(2, 1fr); }
            .best-item:nth-child(even) { border-right: none; }
            .best-item:nth-child(odd):not(:last-child) { border-right: 0.5px solid var(--clr-border); }
            .value-grid { grid-template-columns: repeat(2, 1fr); }
            .value-item:nth-child(even) { border-right: none; }
            .info-field { grid-template-columns: 110px 1fr; }
            .profile-info { padding: 28px 24px; }
        }
        @media (max-width: 600px) {
            .bests-grid { grid-template-columns: repeat(2, 1fr); }
            .value-grid { grid-template-columns: repeat(2, 1fr); }
            th, td { padding: 10px 12px; }
            .profile-name { font-size: 2rem; }
            .card-body { padding: 20px; }
        }

        :focus-visible { outline: 1px solid var(--clr-gold); outline-offset: 3px; }

        @media (prefers-reduced-motion: reduce) {
            .loading-spinner { animation: none; }
            * { transition-duration: 0.01ms !important; }
        }
    </style>
</head>

         HEADER

    <!-- ============================================================

         ============================================================ -->
    <main class="profile-page" id="profile-page" style="display:none;" aria-labelledby="profile-name-heading">

        <!-- 7. REPRESENTATION — populated from athletes.json by JS -->
        <section class="profile-card" aria-labelledby="representation-heading">
            <div class="card-header">
                <div class="card-header-icon" aria-hidden="true">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">

    </main>

         FOOTER
         ============================================================ -->
    <footer class="profile-footer">
        <p>
            <a href="index.html">LionStride Management</a>
            &nbsp;—&nbsp; Building Champions Globally &nbsp;·&nbsp;
            &copy; <span id="footer-year"></span>
        </p>
    </footer>

    <script>
    /* ===========================================================
       ATHLETE PROFILE — Dynamic renderer
       ----------------------------------------------------------
       Reads ?id= from the URL, fetches athletes.json, finds the
       matching athlete object, and renders every section from
       the JSON data.  No hardcoded content — add any athlete to
       athletes.json and this page renders their profile
       automatically.
       =========================================================== */

    /* --- Footer year --- */
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    /* --- Icon library (SVG strings keyed by name) --- */
    const ICONS = {
        trophy: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 9H4.5a2.5 2.5 0 010-5H6"/><path d="M18 9h1.5a2.5 2.5 0 000-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0012 0V2z"/></svg>`,
        medal:  `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>`,
        calendar:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
        chart:  `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`,
        globe:  `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>`,
        trophy_lg:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 9H4.5a2.5 2.5 0 010-5H6"/><path d="M18 9h1.5a2.5 2.5 0 000-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0012 0V2z"/></svg>`,
    };

    const LAUREL = `<svg width="9" height="9" viewBox="0 0 12 14" fill="none" stroke="currentColor" stroke-width="0.8"><path d="M6 13C6 13 2 10 2 6C2 4 3 2 6 1C3 2 2 4 2 6C2 10 6 13 6 13Z" stroke-linecap="round"/><path d="M6 13C6 13 10 10 10 6C10 4 9 2 6 1C9 2 10 4 10 6C10 10 6 13 6 13Z" stroke-linecap="round"/></svg>`;

    /* ===========================================================
       MAIN — fetch JSON → find athlete → render all sections
       =========================================================== */
    async function loadProfile() {
        const loadingEl = document.getElementById('loading-state');
        const errorEl   = document.getElementById('error-state');
        const pageEl    = document.getElementById('profile-page');

        /* Read ?id= from the URL */
        const id = new URLSearchParams(window.location.search).get('id');
        if (!id) { showError(loadingEl, errorEl); return; }

        try {
            const res      = await fetch('athletes.json');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const athletes = await res.json();
            const athlete  = athletes.find(a => a.id === id);

            if (!athlete) { showError(loadingEl, errorEl); return; }

            /* Update browser tab title */
            document.title = `${athlete.name} — LionStride Management`;

            /* Render every section from JSON data */
            renderHero(athlete);
            renderStats(athlete);
            renderOverview(athlete);
            renderResults(athlete);
            renderAchievements(athlete);
            renderCareer(athlete);
            renderRepresentation(athlete);

            /* Show profile, hide loader */
            loadingEl.style.display = 'none';
            pageEl.style.display    = 'block';

        } catch (err) {
            console.error('Profile load error:', err);
            showError(loadingEl, errorEl);
        }
    }

    function showError(loadingEl, errorEl) {
        loadingEl.style.display = 'none';
        errorEl.style.display   = 'flex';
    }

    /* ===========================================================
       SECTION RENDERERS
       =========================================================== */

    /* 1 — Hero: photo, name, eyebrow, info fields, tags */
    function renderHero(a) {
        /* Photo */
        const img = document.getElementById('profile-img');
        img.src = a.image || '';
        img.alt = `${a.name} — ${a.sport}`;

        /* Eyebrow (sport line) */
        document.getElementById('profile-eyebrow').textContent = a.sport;

        /* Name */
        document.getElementById('profile-name-heading').textContent = a.name;

        /* Info fields from infoFields array */
        document.getElementById('info-fields').innerHTML =
            (a.infoFields || []).map(f => `
                <div class="info-field">
                    <span class="info-label">${f.label}</span>
                    <span class="info-value">${f.value}</span>
                </div>
            `).join('');

        /* Tags */
        document.getElementById('profile-tags').innerHTML =
            (a.tags || []).map(tag => `
                <span class="profile-tag">${LAUREL} ${tag}</span>
            `).join('');
    }

    /* 2 — Performance stats grid */
    function renderStats(a) {
        document.getElementById('bests-grid').innerHTML =
            (a.performanceStats || []).map(s => `
                <div class="best-item">
                    <div class="best-event">${s.label}</div>
                    <div class="best-value">${s.value}</div>
                </div>
            `).join('');
    }

    /* 3 — Athlete overview paragraph */
    function renderOverview(a) {
        document.getElementById('overview-text').textContent = a.description || '';
    }

    /* 4 — Competition results table */
    function renderResults(a) {
        document.getElementById('results-tbody').innerHTML =
            (a.results || []).map(r => `
                <tr>
                    <td>${r.year}</td>
                    <td class="td-race">${r.event}</td>
                    <td><span class="td-goal">${r.result}</span></td>
                    <td>${r.time}</td>
                </tr>
            `).join('');
    }

    /* 5 — National achievements list */
    function renderAchievements(a) {
        document.getElementById('achievements-list').innerHTML =
            (a.achievements || []).map(ac => `
                <div class="achievement-item">
                    <div class="achievement-icon" aria-hidden="true">
                        ${ICONS[ac.icon] || ICONS.trophy}
                    </div>
                    <div>
                        <div class="achievement-text">${ac.title}</div>
                        <div class="achievement-sub">${ac.subtitle}</div>
                    </div>
                </div>
            `).join('');
    }

    /* 6 — Career positioning paragraph */
    function renderCareer(a) {
        document.getElementById('career-text').innerHTML =
            (a.careerPositioning || []).map(cp => `
                <div class="achievement-item">
                    <div>
                        <div class="achievement-text">${cp.title}</div>
                    </div>
                </div>
            `).join('');
    }

    /* 7 — Representation icon grid */
    function renderRepresentation(a) {
        document.getElementById('representation-grid').innerHTML =
            (a.representation || []).map(r => `
                <div class="value-item">
                    <div class="value-icon" aria-hidden="true">
                </div>
            `).join('');
    }

    /* 7 — Representation icon grid */
    function renderRepresentation(a) {
        document.getElementById('representation-grid').innerHTML =
            (a.representation || []).map(r => `
                <div class="value-item">
                    <div class="value-icon" aria-hidden="true">
                        ${ICONS[r.icon + '_lg'] || ICONS[r.icon] || ICONS.globe}
                    </div>
                    <span class="value-label">${r.label}</span>
                </div>
            `).join('');
    }

    /* Boot */
    loadProfile();
    </script>
</body>

</html>
